<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz 10 — JIT Compilation & Optimisation</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      min-height: 100vh;
      padding: 2rem 1rem;
    }
    .container { max-width: 800px; margin: 0 auto; }
    h1 {
      text-align: center;
      margin-bottom: 0.5rem;
      font-size: 1.8rem;
      color: #ffffff;
    }
    .subtitle {
      text-align: center;
      color: #8892b0;
      margin-bottom: 2rem;
      font-size: 1rem;
    }
    .progress-bar-container {
      background: #0d1117;
      border-radius: 10px;
      height: 14px;
      margin-bottom: 2rem;
      overflow: hidden;
    }
    .progress-bar {
      background: linear-gradient(90deg, #0d6efd, #4dabf7);
      height: 100%;
      width: 0%;
      border-radius: 10px;
      transition: width 0.4s ease;
    }
    .progress-text {
      text-align: center;
      font-size: 0.9rem;
      color: #8892b0;
      margin-bottom: 1.5rem;
    }
    .card {
      background: #16213e;
      border-radius: 12px;
      padding: 2rem;
      margin-bottom: 1.5rem;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
    }
    .question-label {
      font-size: 0.85rem;
      color: #4dabf7;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 0.5rem;
    }
    .question-text {
      font-size: 1.15rem;
      margin-bottom: 1.2rem;
      line-height: 1.5;
      color: #ffffff;
    }
    pre {
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 1rem;
      margin-bottom: 1.2rem;
      overflow-x: auto;
      font-size: 0.95rem;
    }
    code {
      font-family: 'Consolas', 'Fira Code', 'Courier New', monospace;
      color: #c9d1d9;
    }
    .options { list-style: none; }
    .options li { margin-bottom: 0.6rem; }
    .options label {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.8rem 1rem;
      background: #0d1117;
      border: 2px solid #30363d;
      border-radius: 8px;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      font-size: 1rem;
    }
    .options label:hover { border-color: #4dabf7; background: #1c2a4a; }
    .options input[type="radio"] {
      accent-color: #0d6efd;
      width: 18px;
      height: 18px;
      flex-shrink: 0;
    }
    .btn {
      display: inline-block;
      padding: 0.7rem 2rem;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }
    .btn:active { transform: scale(0.97); }
    .btn-primary { background: #0d6efd; color: #fff; }
    .btn-primary:hover { background: #3b82f6; }
    .btn-primary:disabled { background: #374151; cursor: not-allowed; }
    .btn-restart { background: #0d6efd; color: #fff; margin-top: 1rem; }
    .btn-restart:hover { background: #3b82f6; }
    .feedback {
      margin-top: 1rem;
      padding: 1rem 1.2rem;
      border-radius: 8px;
      font-size: 0.95rem;
      line-height: 1.5;
      display: none;
    }
    .feedback.correct {
      background: #0f5132;
      border: 1px solid #198754;
      color: #d1fae5;
      display: block;
    }
    .feedback.wrong {
      background: #842029;
      border: 1px solid #dc3545;
      color: #fdd;
      display: block;
    }
    .score-card { text-align: center; padding: 3rem 2rem; }
    .score-card .score { font-size: 3rem; font-weight: 700; color: #4dabf7; margin-bottom: 0.5rem; }
    .score-card .score-label { font-size: 1.2rem; color: #8892b0; margin-bottom: 1.5rem; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Quiz 10 — JIT Compilation & Optimisation</h1>
    <p class="subtitle">Maîtrisez la compilation Just-In-Time et les optimisations V8</p>

    <div class="progress-bar-container">
      <div class="progress-bar" id="progressBar"></div>
    </div>
    <p class="progress-text" id="progressText">Question 1 / 5</p>

    <div id="quizContainer"></div>
    <div id="scoreContainer" class="card score-card hidden"></div>
  </div>

  <script>
    const questions = [
      {
        label: "Concept",
        text: "Qu'est-ce que l'optimisation spéculative ?",
        code: null,
        options: [
          "Deviner quel code l'utilisateur va écrire",
          "Compiler du code optimisé pour les types observés, avec des gardes qui déoptimisent si les types changent",
          "Exécuter le code en avance",
          "Supprimer le code mort automatiquement"
        ],
        answer: 1,
        explanation: "TurboFan compile en supposant que les types observés (via le Feedback Vector) ne changeront pas. Des 'gardes' vérifient cette hypothèse à chaque exécution."
      },
      {
        label: "Concept",
        text: "Qu'est-ce que l'escape analysis ?",
        code: null,
        options: [
          "Analyser les erreurs non attrapées",
          "Déterminer si un objet peut être alloué sur la pile au lieu du tas (car il ne 's'échappe' pas de la fonction)",
          "Détecter les boucles infinies",
          "Vérifier les imports manquants"
        ],
        answer: 1,
        explanation: "Si un objet est créé et utilisé uniquement dans une fonction sans jamais être retourné ou stocké, l'escape analysis permet de l'allouer sur la stack (ou même d'éliminer l'allocation)."
      },
      {
        label: "Prédiction de code",
        text: "Que montre --trace-deopt pour ce code ?",
        code: "function add(a, b) { return a + b; }\nfor (let i = 0; i < 100000; i++) add(i, i);\nadd('hello', 'world'); // type change!",
        options: [
          "Rien de spécial",
          "Eager deoptimization — le guard sur le type number échoue quand des strings sont passées",
          "Lazy deoptimization",
          "Soft deoptimization"
        ],
        answer: 1,
        explanation: "add() a été optimisée pour des numbers. Quand des strings arrivent, le guard échoue immédiatement → déoptimisation eager. Le code retourne à Ignition."
      },
      {
        label: "Prédiction de code",
        text: "Combien de déoptimisations V8 tolère-t-il avant d'abandonner ?",
        code: null,
        options: [
          "1",
          "5",
          "~10",
          "Illimité"
        ],
        answer: 2,
        explanation: "Après environ 10 déoptimisations, V8 marque la fonction comme 'don't optimize' et la laisse en Ignition/Sparkplug définitivement."
      },
      {
        label: "Pourquoi ?",
        text: "Pourquoi l'inlining est-il considéré comme 'la reine des optimisations' ?",
        code: null,
        options: [
          "Il économise de la mémoire",
          "Il élimine le coût de l'appel ET expose le code inliné aux autres optimisations (constant folding, escape analysis, etc.)",
          "Il rend le code plus lisible",
          "Il accélère le garbage collector"
        ],
        answer: 1,
        explanation: "L'inlining copie le corps de la fonction appelée dans l'appelant. Cela supprime l'overhead d'appel ET permet à TurboFan d'optimiser le code combiné (propagation de constantes, élimination d'allocations)."
      }
    ];

    let currentQuestion = 0;
    let score = 0;
    let answered = false;

    function renderQuestion() {
      answered = false;
      const q = questions[currentQuestion];
      const container = document.getElementById('quizContainer');
      const pct = (currentQuestion / questions.length) * 100;
      document.getElementById('progressBar').style.width = pct + '%';
      document.getElementById('progressText').textContent = `Question ${currentQuestion + 1} / ${questions.length}`;

      let html = `<div class="card">
        <p class="question-label">${q.label} — Question ${currentQuestion + 1}</p>
        <p class="question-text">${q.text}</p>`;
      if (q.code) {
        html += `<pre><code>${escapeHtml(q.code)}</code></pre>`;
      }
      html += `<ul class="options">`;
      q.options.forEach((opt, i) => {
        html += `<li><label><input type="radio" name="q${currentQuestion}" value="${i}"><span>${opt}</span></label></li>`;
      });
      html += `</ul>
        <div style="margin-top:1rem;">
          <button class="btn btn-primary" id="validateBtn" onclick="validate()">Valider</button>
        </div>
        <div class="feedback" id="feedback"></div>
      </div>`;
      container.innerHTML = html;
    }

    function escapeHtml(str) {
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function validate() {
      if (answered) { nextQuestion(); return; }
      const selected = document.querySelector(`input[name="q${currentQuestion}"]:checked`);
      if (!selected) return;
      answered = true;
      const val = parseInt(selected.value);
      const q = questions[currentQuestion];
      const feedback = document.getElementById('feedback');
      const btn = document.getElementById('validateBtn');
      document.querySelectorAll(`input[name="q${currentQuestion}"]`).forEach(r => r.disabled = true);
      if (val === q.answer) {
        score++;
        feedback.className = 'feedback correct';
        feedback.innerHTML = `<strong>\u2705 Correct !</strong><br>${q.explanation}`;
      } else {
        feedback.className = 'feedback wrong';
        feedback.innerHTML = `<strong>\u274C Incorrect</strong> — La bonne réponse était : <em>${q.options[q.answer]}</em><br><br>${q.explanation}`;
      }
      btn.textContent = currentQuestion < questions.length - 1 ? 'Suivant' : 'Voir le score';
    }

    function nextQuestion() {
      currentQuestion++;
      if (currentQuestion < questions.length) { renderQuestion(); } else { showScore(); }
    }

    function showScore() {
      document.getElementById('quizContainer').classList.add('hidden');
      document.getElementById('progressBar').style.width = '100%';
      document.getElementById('progressText').textContent = 'Terminé !';
      const sc = document.getElementById('scoreContainer');
      sc.classList.remove('hidden');
      sc.innerHTML = `
        <div class="score">Score : ${score} / ${questions.length}</div>
        <p class="score-label">${score === questions.length ? 'Parfait ! Excellente maîtrise !' : score >= 3 ? 'Bon travail ! Révisez les points manqués.' : 'Continuez à étudier, vous progresserez !'}</p>
        <button class="btn btn-restart" onclick="restart()">Recommencer</button>`;
    }

    function restart() {
      currentQuestion = 0; score = 0;
      document.getElementById('scoreContainer').classList.add('hidden');
      document.getElementById('quizContainer').classList.remove('hidden');
      renderQuestion();
    }

    renderQuestion();
  </script>
</body>
</html>

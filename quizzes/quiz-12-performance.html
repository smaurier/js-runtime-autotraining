<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz 12 — Performance Patterns</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      min-height: 100vh;
      padding: 2rem 1rem;
    }
    .container { max-width: 800px; margin: 0 auto; }
    h1 {
      text-align: center;
      margin-bottom: 0.5rem;
      font-size: 1.8rem;
      color: #ffffff;
    }
    .subtitle {
      text-align: center;
      color: #8892b0;
      margin-bottom: 2rem;
      font-size: 1rem;
    }
    .progress-bar-container {
      background: #0d1117;
      border-radius: 10px;
      height: 14px;
      margin-bottom: 2rem;
      overflow: hidden;
    }
    .progress-bar {
      background: linear-gradient(90deg, #0d6efd, #4dabf7);
      height: 100%;
      width: 0%;
      border-radius: 10px;
      transition: width 0.4s ease;
    }
    .progress-text {
      text-align: center;
      font-size: 0.9rem;
      color: #8892b0;
      margin-bottom: 1.5rem;
    }
    .card {
      background: #16213e;
      border-radius: 12px;
      padding: 2rem;
      margin-bottom: 1.5rem;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
    }
    .question-label {
      font-size: 0.85rem;
      color: #4dabf7;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 0.5rem;
    }
    .question-text {
      font-size: 1.15rem;
      margin-bottom: 1.2rem;
      line-height: 1.5;
      color: #ffffff;
    }
    pre {
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 1rem;
      margin-bottom: 1.2rem;
      overflow-x: auto;
      font-size: 0.95rem;
    }
    code {
      font-family: 'Consolas', 'Fira Code', 'Courier New', monospace;
      color: #c9d1d9;
    }
    .options { list-style: none; }
    .options li { margin-bottom: 0.6rem; }
    .options label {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.8rem 1rem;
      background: #0d1117;
      border: 2px solid #30363d;
      border-radius: 8px;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      font-size: 1rem;
    }
    .options label:hover { border-color: #4dabf7; background: #1c2a4a; }
    .options input[type="radio"] {
      accent-color: #0d6efd;
      width: 18px;
      height: 18px;
      flex-shrink: 0;
    }
    .btn {
      display: inline-block;
      padding: 0.7rem 2rem;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }
    .btn:active { transform: scale(0.97); }
    .btn-primary { background: #0d6efd; color: #fff; }
    .btn-primary:hover { background: #3b82f6; }
    .btn-primary:disabled { background: #374151; cursor: not-allowed; }
    .btn-restart { background: #0d6efd; color: #fff; margin-top: 1rem; }
    .btn-restart:hover { background: #3b82f6; }
    .feedback {
      margin-top: 1rem;
      padding: 1rem 1.2rem;
      border-radius: 8px;
      font-size: 0.95rem;
      line-height: 1.5;
      display: none;
    }
    .feedback.correct {
      background: #0f5132;
      border: 1px solid #198754;
      color: #d1fae5;
      display: block;
    }
    .feedback.wrong {
      background: #842029;
      border: 1px solid #dc3545;
      color: #fdd;
      display: block;
    }
    .score-card { text-align: center; padding: 3rem 2rem; }
    .score-card .score { font-size: 3rem; font-weight: 700; color: #4dabf7; margin-bottom: 0.5rem; }
    .score-card .score-label { font-size: 1.2rem; color: #8892b0; margin-bottom: 1.5rem; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Quiz 12 — Performance Patterns</h1>
    <p class="subtitle">Appliquez les bonnes pratiques de performance JavaScript</p>

    <div class="progress-bar-container">
      <div class="progress-bar" id="progressBar"></div>
    </div>
    <p class="progress-text" id="progressText">Question 1 / 5</p>

    <div id="quizContainer"></div>
    <div id="scoreContainer" class="card score-card hidden"></div>
  </div>

  <script>
    const questions = [
      {
        label: "Concept",
        text: "Quel est le principe de la loi d'Amdahl ?",
        code: null,
        options: [
          "Plus de RAM = plus de vitesse",
          "L'accélération globale est limitée par la fraction du code qui n'est PAS optimisée",
          "Le code s'accélère linéairement avec le nombre de cœurs",
          "Les algorithmes O(n) sont toujours plus rapides"
        ],
        answer: 1,
        explanation: "Si seulement 5% du temps est dans la fonction optimisée, même une optimisation 100x ne donne que ~5% d'accélération globale. Focalisez-vous sur les hotspots (80%+ du temps)."
      },
      {
        label: "Concept",
        text: "Quel outil génère un flame chart pour Node.js ?",
        code: null,
        options: [
          "console.time",
          "--cpu-prof (génère un .cpuprofile chargeable dans DevTools)",
          "npm audit",
          "eslint --fix"
        ],
        answer: 1,
        explanation: "--cpu-prof génère un fichier .cpuprofile qu'on peut charger dans Chrome DevTools (Performance tab) pour voir un flame chart interactif."
      },
      {
        label: "Prédiction de code",
        text: "Pourquoi ce pattern est-il O(n²) en mémoire ?",
        code: "let result = '';\nfor (let i = 0; i < 100000; i++) {\n  result += 'x';\n}",
        options: [
          "La boucle est trop longue",
          "Chaque concaténation crée une NOUVELLE string (les strings sont immutables), copiant tout le contenu précédent",
          "Le GC ne fonctionne pas dans les boucles",
          "C'est un bug de V8"
        ],
        answer: 1,
        explanation: "Les strings JS sont immutables. `result += 'x'` crée une nouvelle string de taille n+1 et copie l'ancienne. Total: 1+2+3+...+n = O(n²). Solution : Array.push() puis .join()."
      },
      {
        label: "Prédiction de code",
        text: "Quel est le problème ?",
        code: "function process(items) {\n  items.forEach(item => {\n    const result = { ...item, processed: true };\n    db.save(result);\n  });\n}",
        options: [
          "forEach est lent",
          "Création d'un nouvel objet à chaque itération → pression GC si items est grand",
          "Le spread operator est obsolète",
          "db.save est synchrone"
        ],
        answer: 1,
        explanation: "Chaque itération crée un nouvel objet via spread. Sur un grand tableau, cela crée une forte pression sur le GC (Young Generation). Solution : réutiliser un objet ou utiliser un pool."
      },
      {
        label: "Pourquoi ?",
        text: "Pourquoi faut-il TOUJOURS mesurer avant d'optimiser ?",
        code: null,
        options: [
          "Pour facturer le temps passé",
          "L'intuition humaine est souvent fausse sur les hotspots — le profiler montre OÙ le temps est réellement passé",
          "Pour satisfaire le chef de projet",
          "Parce que le code est toujours assez rapide"
        ],
        answer: 1,
        explanation: "Les développeurs se trompent souvent sur ce qui est lent. Le profiler (flame chart, bottom-up) montre objectivement où le temps est passé. Optimiser sans mesurer = optimiser le mauvais code."
      }
    ];

    let currentQuestion = 0;
    let score = 0;
    let answered = false;

    function renderQuestion() {
      answered = false;
      const q = questions[currentQuestion];
      const container = document.getElementById('quizContainer');
      const pct = (currentQuestion / questions.length) * 100;
      document.getElementById('progressBar').style.width = pct + '%';
      document.getElementById('progressText').textContent = `Question ${currentQuestion + 1} / ${questions.length}`;

      let html = `<div class="card">
        <p class="question-label">${q.label} — Question ${currentQuestion + 1}</p>
        <p class="question-text">${q.text}</p>`;
      if (q.code) {
        html += `<pre><code>${escapeHtml(q.code)}</code></pre>`;
      }
      html += `<ul class="options">`;
      q.options.forEach((opt, i) => {
        html += `<li><label><input type="radio" name="q${currentQuestion}" value="${i}"><span>${opt}</span></label></li>`;
      });
      html += `</ul>
        <div style="margin-top:1rem;">
          <button class="btn btn-primary" id="validateBtn" onclick="validate()">Valider</button>
        </div>
        <div class="feedback" id="feedback"></div>
      </div>`;
      container.innerHTML = html;
    }

    function escapeHtml(str) {
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function validate() {
      if (answered) { nextQuestion(); return; }
      const selected = document.querySelector(`input[name="q${currentQuestion}"]:checked`);
      if (!selected) return;
      answered = true;
      const val = parseInt(selected.value);
      const q = questions[currentQuestion];
      const feedback = document.getElementById('feedback');
      const btn = document.getElementById('validateBtn');
      document.querySelectorAll(`input[name="q${currentQuestion}"]`).forEach(r => r.disabled = true);
      if (val === q.answer) {
        score++;
        feedback.className = 'feedback correct';
        feedback.innerHTML = `<strong>\u2705 Correct !</strong><br>${q.explanation}`;
      } else {
        feedback.className = 'feedback wrong';
        feedback.innerHTML = `<strong>\u274C Incorrect</strong> — La bonne réponse était : <em>${q.options[q.answer]}</em><br><br>${q.explanation}`;
      }
      btn.textContent = currentQuestion < questions.length - 1 ? 'Suivant' : 'Voir le score';
    }

    function nextQuestion() {
      currentQuestion++;
      if (currentQuestion < questions.length) { renderQuestion(); } else { showScore(); }
    }

    function showScore() {
      document.getElementById('quizContainer').classList.add('hidden');
      document.getElementById('progressBar').style.width = '100%';
      document.getElementById('progressText').textContent = 'Terminé !';
      const sc = document.getElementById('scoreContainer');
      sc.classList.remove('hidden');
      sc.innerHTML = `
        <div class="score">Score : ${score} / ${questions.length}</div>
        <p class="score-label">${score === questions.length ? 'Parfait ! Excellente maîtrise !' : score >= 3 ? 'Bon travail ! Révisez les points manqués.' : 'Continuez à étudier, vous progresserez !'}</p>
        <button class="btn btn-restart" onclick="restart()">Recommencer</button>`;
    }

    function restart() {
      currentQuestion = 0; score = 0;
      document.getElementById('scoreContainer').classList.add('hidden');
      document.getElementById('quizContainer').classList.remove('hidden');
      renderQuestion();
    }

    renderQuestion();
  </script>
</body>
</html>
